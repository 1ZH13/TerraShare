name: Admin Dashboard CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/admin-dashboard/**"
      - ".github/workflows/admin-dashboard-e2e.yml"
  push:
    branches: [main]
    paths:
      - "apps/admin-dashboard/**"
      - ".github/workflows/admin-dashboard-e2e.yml"

permissions:
  contents: read

jobs:
  build-and-e2e:
    name: Build and E2E (admin-dashboard)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/admin-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Build admin dashboard
        run: bun run build

      - name: Run E2E smoke tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-admin-dashboard
          path: apps/admin-dashboard/playwright-report
          if-no-files-found: ignore
